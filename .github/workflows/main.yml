name: Daily Stock Scan
on:
  schedule:
    # 这里的意思是每天北京时间下午 16:00 自动运行 (UTC时间08:00)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Scanner
        run: python main.py
